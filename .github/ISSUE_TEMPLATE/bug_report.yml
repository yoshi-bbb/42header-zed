name: Bug report
description: Report a reproducible problem with zed-42header.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command or Zed settings used, plus a minimal input file.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Save or format ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: zed-42header version
      placeholder: "0.1.0"
  - type: input
    id: zed
    attributes:
      label: Zed version
      placeholder: "Zed 1.x.x"
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - WSL
        - Other
  - type: textarea
    id: extra
    attributes:
      label: Additional context

